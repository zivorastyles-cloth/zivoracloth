{% extends 'base.html' %}
{% block content %}
<h2>Cart</h2>
<section class="card">
  <p>Wallet Coins: <strong>{{ wallet }}</strong></p>
  <ul class="cart-list">
    {% for item in items %}
      <li>
        <div>
          {{ item.product.name }} x {{ item.qty }} = {{ item.subtotal }} coins
        </div>
        <form class="cart-actions" method="post" action="{{ url_for('update_cart', product_id=item.product.id) }}">
          <input type="number" name="qty" min="0" value="{{ item.qty }}">
          <button type="submit">Update</button>
          <button type="submit" name="qty" value="0" class="danger">Remove</button>
        </form>
      </li>
    {% else %}
      <li>Cart is empty.</li>
    {% endfor %}
  </ul>
  <p>Total: <strong>{{ total }}</strong> coins</p>
  <form method="post" action="{{ url_for('checkout') }}">
    <button type="submit">Checkout</button>
  </form>
  <p><a href="{{ url_for('dashboard') }}">Back to dashboard</a></p>
</section>
{% endblock %}
