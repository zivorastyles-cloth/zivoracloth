{% extends 'base.html' %}
{% block content %}
<section class="card narrow">
  <h2>Login (Admin/Reseller only)</h2>
  <p>No signup is allowed. IDs are created from admin panel.</p>
  <form method="post">
    <label>Username <input type="text" name="username" required></label>
    <label>Password <input type="password" name="password" required></label>
    <button type="submit">Login</button>
  </form>
  <p class="hint">Default admin: <code>admin/admin123</code></p>
</section>
{% endblock %}
