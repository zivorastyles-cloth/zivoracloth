<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zivora Styles | Orders</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="reseller-orders">
  <header class="topbar">
    <div class="brand-wrap">
      <img src="assets/zivora-logo.svg" alt="Zivora Styles logo" class="brand-logo" />
      <div>
        <h1>Purchase & Tracking</h1>
        <p id="welcomeText">Reseller Store</p>
      </div>
    </div>
    <nav class="market-nav">
      <a class="nav-link" href="reseller-home.html">Home</a>
      <a class="nav-link" href="reseller-wallet.html">Wallet</a>
      <a class="nav-link active" href="reseller-orders.html">Orders</a>
      <a class="nav-link cart-pill" href="reseller-cart.html">🛒 Cart <span id="navCartCount">0</span></a>
      <button id="logoutBtn" class="secondary small">Logout</button>
    </nav>
  </header>

  <main class="container cards two-cols">
    <section class="panel">
      <h2>Purchase History</h2>
      <div id="purchaseRecords" class="records"></div>
    </section>
    <section class="panel">
      <h2>Order Tracking</h2>
      <div id="trackingRecords" class="records"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
